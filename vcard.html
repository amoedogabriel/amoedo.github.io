<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Amoêdo | Cartão Digital</title>
    
    <!-- Pré-conexão com o Google Fonts para acelerar o carregamento da fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           CSS Otimizado (Substitui o Tailwind Play CDN de 3MB por ~2KB)
           ========================================================================== */
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-darker: #64748b;
            --emerald: #34d399;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-400: #60a5fa;
            --whatsapp: #25D366;
            --instagram: #E1306C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }

        main { width: 100%; max-width: 24rem; margin: 0 auto; }

        /* Perfil */
        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
        .avatar-ring {
            width: 7rem; height: 7rem; border-radius: 50%; padding: 0.25rem; margin-bottom: 1rem;
            background-image: linear-gradient(to top right, var(--blue-500), var(--emerald));
        }
        .avatar-svg {
            width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-start);
            object-fit: cover; background: var(--bg-end);
        }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 0.25rem; line-height: 1.2; }
        .location { display: flex; align-items: center; color: var(--text-muted); font-size: 0.875rem; }

        /* Botão Principal */
        .actions { display: flex; flex-direction: column; gap: 1rem; width: 100%; }
        .btn-save {
            width: 100%; display: flex; align-items: center; justify-content: center;
            background-image: linear-gradient(to right, var(--blue-600), var(--blue-500));
            color: white; font-weight: 600; padding: 1rem 1.5rem; border-radius: 1rem;
            border: none; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3), 0 4px 6px -4px rgba(59, 130, 246, 0.3);
            transition: all 0.15s ease;
            text-decoration: none; font-size: 1rem;
        }
        .btn-save:hover { background-image: linear-gradient(to right, var(--blue-500), var(--blue-400)); }
        .btn-save:active { transform: scale(0.95); }

        /* Botões Secundários */
        .links-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
        .glass-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 1rem; border-radius: 1rem; text-decoration: none; color: inherit;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-btn:hover, .glass-btn:active {
            background: rgba(255, 255, 255, 0.1); transform: translateY(-2px) scale(0.98);
        }
        .link-info { display: flex; align-items: center; }
        .icon-box {
            width: 2.5rem; height: 2.5rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-right: 1rem;
        }
        .bg-wa { background: rgba(37, 211, 102, 0.2); color: var(--whatsapp); }
        .bg-ig { background: rgba(225, 48, 108, 0.2); color: var(--instagram); }
        .link-text { text-align: left; }
        .link-text h2 { font-size: 0.875rem; font-weight: 600; line-height: 1.2; }
        .link-text p { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* Rodapé */
        footer { margin-top: 3rem; text-align: center; }
        footer p { font-size: 0.75rem; color: var(--text-darker); }

        /* Animações */
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.5s; }

        /* Utilitários de SVGs */
        svg { display: block; }
        .icon-location { width: 1rem; height: 1rem; margin-right: 0.5rem; color: var(--emerald); }
        .icon-save { width: 1.5rem; height: 1.5rem; margin-right: 0.75rem; }
        .icon-social { width: 1.25rem; height: 1.25rem; }
        .icon-arrow { width: 1rem; height: 1rem; color: var(--text-darker); }
    </style>
</head>

                        </div>

    <!-- Script para gerar o Contato (vCard) com suporte Cross-Platform -->
    <script>
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Gabriel Amoêdo
N:Amoêdo;Gabriel;;;
TEL;TYPE=CELL:+5592982522812
ADR;TYPE=HOME:;;;Manaus;AM;;Brasil
URL:https://instagram.com/amoedogabriel_
NOTE:Contato salvo via Cartão Digital NFC.
END:VCARD`;

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isIOS) {
                window.location.href = "data:text/x-vcard;charset=utf-8," + encodeURIComponent(vcard);
            } else {
                const blob = new Blob([vcard], { type: 'text/vcard' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'Gabriel_Amoedo.vcf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        }
    </script>
</body>
